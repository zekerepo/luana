<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para Luana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue-deep:  #0a1628;
      --blue-mid:   #2a4a8a;
      --blue-soft:  #4a7cc7;
      --blue-pale:  #c8d9f5;
      --gold:       #d4a853;
      --gold-light: #f0d080;
      --rose:       #c97b84;
      --cream:      #faf7f2;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--blue-deep);
      font-family: 'Lato', sans-serif;
      color: var(--cream);
      overflow-x: hidden;
      min-height: 100vh;
    }

    .bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }
    .bg-gradient {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 15% 5%,  #2a4a8a44 0%, transparent 55%),
        radial-gradient(ellipse 60% 70% at 85% 95%, #1a2f5e66 0%, transparent 50%),
        radial-gradient(ellipse 100% 100% at 50% 50%, #0f1e3f 0%, #0a1628 100%);
    }
    .stars { position: absolute; inset: 0; }
    .star {
      position: absolute; border-radius: 50%; background: white;
      animation: twinkle var(--dur, 3s) ease-in-out infinite var(--delay, 0s);
    }
    @keyframes twinkle {
      0%,100% { opacity: var(--min-op, 0.08); }
      50%      { opacity: var(--max-op, 0.45); }
    }
    .orb {
      position: absolute; border-radius: 50%; filter: blur(70px);
      animation: drift var(--d,15s) ease-in-out infinite var(--dd,0s);
    }
    .orb-1 { width:320px;height:320px;background:#2a4a8a2a;top:-100px;left:-80px;--d:16s; }
    .orb-2 { width:260px;height:260px;background:#d4a85318;bottom:-80px;right:-50px;--d:20s;--dd:-7s; }
    .orb-3 { width:200px;height:200px;background:#c97b8418;top:45%;left:55%;--d:22s;--dd:-11s; }
    @keyframes drift {
      0%,100% { transform:translate(0,0); }
      33%      { transform:translate(18px,-28px); }
      66%      { transform:translate(-14px,18px); }
    }

    /* progress bar */
    #progress-bar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 2px; z-index: 100;
      background: linear-gradient(90deg, var(--gold), var(--rose));
      transform-origin: left; transform: scaleX(0);
      transition: transform 0.08s linear;
    }

    /* intro */
    #intro {
      position: fixed; inset: 0; z-index: 200;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.8rem; padding: 2.5rem; text-align: center;
      background: var(--blue-deep);
      transition: opacity 1s ease, visibility 1s;
    }
    #intro.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .intro-eyebrow {
      font-weight: 300; font-size: 12px;
      letter-spacing: 0.35em; text-transform: uppercase;
      color: var(--blue-pale); opacity: 0.55;
    }
    .intro-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300; font-size: clamp(68px, 22vw, 100px);
      line-height: 1; color: var(--cream);
      text-shadow: 0 0 80px #4a7cc733;
    }
    .intro-rule {
      width: 48px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .intro-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 17px;
      color: var(--blue-pale); opacity: 0.55; letter-spacing: 0.04em;
    }
    .intro-btn {
      margin-top: 0.8rem; padding: 15px 44px;
      border: 1px solid #4a7cc766; border-radius: 50px;
      background: transparent; color: var(--cream);
      font-weight: 300; font-size: 13px;
      letter-spacing: 0.2em; text-transform: uppercase;
      cursor: pointer; transition: all 0.3s ease;
    }
    .intro-btn:hover  { background: #4a7cc711; border-color: #4a7cc799; }
    .intro-btn:active { transform: scale(0.97); }

    /* letter */
    #letter {
      position: relative; z-index: 10;
      max-width: 520px; margin: 0 auto;
      padding: 0 28px 140px;
      opacity: 0; transition: opacity 0.9s ease;
    }
    #letter.visible { opacity: 1; }

    .salutation {
      padding-top: 88px; padding-bottom: 52px; text-align: center;
    }
    .salutation-label {
      font-weight: 300; font-size: 11px;
      letter-spacing: 0.35em; text-transform: uppercase;
      color: var(--blue-pale); opacity: 0.45;
    }

    /* paragraphs */
    .para {
      margin-bottom: 44px;
      opacity: 0; transform: translateY(22px);
      transition: opacity 0.75s ease, transform 0.75s ease;
    }
    .para.revealed { opacity: 1; transform: translateY(0); }

    .para p {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(20px, 5.2vw, 25px);
      line-height: 1.8; color: var(--cream);
    }

    /* grouped block — left gold bar */
    .para.grouped {
      border-left: 1.5px solid #d4a85340;
      padding-left: 22px;
      margin-left: 2px;
      margin-bottom: 52px;
    }
    .para.grouped p {
      font-size: clamp(17px, 4.6vw, 21px);
      color: #e0d8ce; line-height: 1.85;
    }
    .para.grouped p + p { margin-top: 24px; }

    /* separator */
    .sep {
      display: flex; align-items: center; gap: 14px;
      margin: 44px 0;
      opacity: 0; transform: translateY(10px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .sep.revealed { opacity: 1; transform: translateY(0); }
    .sep-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,#4a7cc72a,transparent); }
    .sep-dot  { width:4px; height:4px; border-radius:50%; background:var(--gold); opacity:0.45; }

    /* closing */
    .closing {
      text-align: center; padding-top: 40px;
      opacity: 0; transform: translateY(24px);
      transition: opacity 0.9s ease, transform 0.9s ease;
    }
    .closing.revealed { opacity: 1; transform: translateY(0); }
    .closing-line {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 19px;
      color: var(--blue-pale); opacity: 0.65; margin-bottom: 22px;
    }
    .closing-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300; font-size: 48px;
      color: var(--gold-light);
      text-shadow: 0 0 50px #d4a85330;
      letter-spacing: 0.04em;
    }

    /* scroll hint */
    #scroll-hint {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%);
      z-index: 100; display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      opacity: 0; transition: opacity 0.8s ease;
      pointer-events: none;
    }
    #scroll-hint.visible { opacity: 1; }
    .hint-text {
      font-size: 10px; letter-spacing: 0.28em;
      text-transform: uppercase; color: var(--blue-pale); opacity: 0.45;
    }
    .hint-arrow {
      width: 1px; height: 30px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      animation: arrowPulse 2s ease-in-out infinite;
    }
    @keyframes arrowPulse {
      0%,100% { opacity:0.25; transform:scaleY(1); }
      50%      { opacity:0.75; transform:scaleY(1.1); }
    }
  </style>
</head>
<body>

<div class="bg">
  <div class="bg-gradient"></div>
  <div class="stars" id="stars"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div id="progress-bar"></div>

<div id="intro">
  <div class="intro-eyebrow">a letter for</div>
  <div class="intro-name">Luana</div>
  <div class="intro-rule"></div>
  <div class="intro-sub">from someone who can't stop thinking of you</div>
  <button class="intro-btn" onclick="startReading()">Read ✦</button>
</div>

<div id="letter">
  <div class="salutation">
    <div class="salutation-label">Luana,</div>
  </div>
  <div id="content"></div>
  <div class="closing" id="closing">
    <div class="closing-line">No puedo escapar de ti.</div>
    <div class="closing-name">Luana</div>
  </div>
</div>

<div id="scroll-hint">
  <div class="hint-text">scroll</div>
  <div class="hint-arrow"></div>
</div>

<script>
const content = [
  { type: "single", text: "Do you love me the same way I love you?" },
  { type: "single", text: "Every time I look at a picture of you I feel like I can fly, as if I could conquer the world. You give me superpowers." },
  { type: "single", text: "When was it that I started feeling this way? What went wrong with me to show you this side of me? Can I learn to love you?" },
  { type: "sep" },
  { type: "grouped", texts: ["If I look at the future, will you be there? Why is it I didn't meet you later in our lives? I don't want to drag you into something we aren't prepared for, but I feel an emptiness in my heart every time I think of us."] },
  { type: "single", text: "Why is it that I love you this much? What have you done to me?" },
  { type: "single", text: "If I showed you my true self, would you stay? Aren't these feelings just temporary? Why even try?" },
  { type: "sep" },
  { type: "grouped", texts: ["I torment myself by thinking of us, what can't be us and what could be us. It feels like a torture I need to endure. Why would I need to carry this pain for the time to come?"] },
  { type: "sep" },
  { type: "grouped", texts: ["Luana, you've cursed me, you've put shackles in my heart, but I don't mind to be a slave of love, at the end of the day one is nothing else but a slave of its own desires."] },
  { type: "sep" },
  { type: "grouped", texts: ["Do you miss me? Do you look at your phone and think of me? Do you go on walks and remember that day? I'd give anything to be with you, why can't things be different?"] },
  { type: "single", text: "Please tell me something. I feel like a flower waiting for its bee — come and feed me of your sweet love." },
  { type: "sep" },
  { type: "grouped", texts: ["¿Cuándo será mi pasión saciada? ¿Mis deseos reprimidos concebidos? ¿Mis fantasías cumplidas? ¿Alguna vez me viste con ojos impuros? ¿Alguna vez pensaste en tu mano recorriendo lugares prohibidos? ¿Tu lengua probando la fuente de mis palabras?"] },
  { type: "sep" },
  { type: "grouped", texts: ["I wonder if you'll read this one day. Will we laugh at this and think of how stupid and dumb we were? Will we look back with a bittersweet feeling while we get the love of someone else? Please, god, don't let it be."] },
  { type: "sep" },
  { type: "grouped", texts: ["Me hubiera gustado besar tus labios, jugar con ellos y morderlos. ¿Por qué no pude ahogarme en tus pechos mientras acariciaba tu espalda? Esto es en vano, si en verdad no te volveré a ver, por favor, quítame de todos los lugares, tira nuestras promesas de amor y escupe en mis muestras de afecto, me es más preferido una muestra de absoluto odio que una cucharada de indiferencia, me es ajeno pensar en nuestra relación como algo pasajero, e incluso más extranjero pensar en ti como una lección."] },
  { type: "single", text: "I've listened to your voice on repeat, it feels like a sweet lick of an angel, but once it ends I feel miserable of not having you with me. You should be beside me, you should be with me." },
  { type: "single", text: "¿Cuántas preguntas no pregunté, cuántas acciones no te mostré, cuántas miradas no te tiré? Me revuelve el estómago pensar en una vida sin ti." },
  { type: "sep" },
  { type: "grouped", texts: [
    "I've thought of wishing you to be happy with someone else, but it's a sin for me to do such a thing, I don't want another man to touch your face, kiss your beautiful lips and touch your saint body. You're a land for me to discover, not a place to be exploited.",
    "I've thought of what I feel for you. I've restrained my thoughts of unnecessary imaginations, stopped my tongue from saying truths, prohibited my eyes from getting lost in you.",
    "I think of what we could've been. Would you like to come with me on a trip? Forget about the worries of this noisy world and create ours instead?",
    "I think of what I could've said. Did you want to stop my mouth when those words came out of it? Why did you agree so easily? I can't ask you for nothing, as I myself didn't work hard enough. Please forgive me, forgive me and clean my consciousness of the stupidity I committed in front of you."
  ]},
  { type: "single", text: "How can you be so hot? How can you be so dumb? How can you be so intelligent? How can you be you?" },
  { type: "single", text: "Estoy cansado de pensar en ti. No puedo desviar mi mirada de tu rostro, mis oídos de tu voz, mis brazos de tu cuerpo, mi mente de ti. No puedo escapar de ti." },
];

// Stars
const starsEl = document.getElementById('stars');
for (let i = 0; i < 90; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 1.8 + 0.4;
  s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--delay:-${Math.random()*5}s;--min-op:${0.04+Math.random()*0.07};--max-op:${0.22+Math.random()*0.4};`;
  starsEl.appendChild(s);
}

// Build content
function buildLetter() {
  const container = document.getElementById('content');
  content.forEach(block => {
    if (block.type === 'sep') {
      const el = document.createElement('div');
      el.className = 'sep';
      el.innerHTML = '<div class="sep-line"></div><div class="sep-dot"></div><div class="sep-line"></div>';
      container.appendChild(el);
    } else if (block.type === 'single') {
      const el = document.createElement('div');
      el.className = 'para';
      el.innerHTML = `<p>${block.text}</p>`;
      container.appendChild(el);
    } else if (block.type === 'grouped') {
      const el = document.createElement('div');
      el.className = 'para grouped';
      el.innerHTML = block.texts.map(t => `<p>${t}</p>`).join('');
      container.appendChild(el);
    }
  });
}

function startReading() {
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('letter').classList.add('visible');
  const hint = document.getElementById('scroll-hint');
  setTimeout(() => { hint.classList.add('visible'); }, 1000);
  setTimeout(() => { hint.classList.remove('visible'); }, 4500);
  checkReveal();
}

function checkReveal() {
  const winH = window.innerHeight;
  document.querySelectorAll('.para, .sep, .closing').forEach(el => {
    if (el.getBoundingClientRect().top < winH * 0.9) {
      el.classList.add('revealed');
    }
  });
  // progress
  const doc = document.documentElement;
  const pct = doc.scrollHeight > doc.clientHeight
    ? doc.scrollTop / (doc.scrollHeight - doc.clientHeight) : 0;
  document.getElementById('progress-bar').style.transform = `scaleX(${pct})`;
}

buildLetter();
window.addEventListener('scroll', checkReveal, { passive: true });
window.addEventListener('resize', checkReveal, { passive: true });
</script>
</body>
</html>
